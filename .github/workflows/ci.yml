name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  node:
    name: Node Checks
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            mobile/MkulimaLink/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile/MkulimaLink

      - name: Audit root dependencies
        run: npm audit --audit-level=moderate

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate
        working-directory: frontend

      - name: Audit mobile dependencies
        run: npm audit --audit-level=moderate
        working-directory: mobile/MkulimaLink

      - name: Run backend tests
        run: npm test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/mkulimalink_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Run mobile lint
        run: npm run lint
        working-directory: mobile/MkulimaLink

      - name: Run mobile tests
        run: npm test
        working-directory: mobile/MkulimaLink

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  python-deps:
    name: Python Dependency Resolution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: ai-ml/requirements.txt

      - name: Validate AI/ML dependency graph
        run: python -m pip install --dry-run -r requirements.txt
        working-directory: ai-ml

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: node
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mkulimalink:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
